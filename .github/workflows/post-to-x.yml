name: Post to X (Twitter)

on:
  push:
    branches: [main]
    paths:
      - 'site/src/content/blog/**'

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get newly added blog files
        id: new-files
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- site/src/content/blog/ | grep '\.md$' | tr '\n' ' ')
          echo "files=$NEW_FILES" >> $GITHUB_OUTPUT
          if [ -z "$NEW_FILES" ]; then
            echo "新規ブログ記事なし。投稿をスキップします。"
          else
            echo "新規ブログ記事: $NEW_FILES"
          fi

      - name: Set up Python
        if: steps.new-files.outputs.files != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.new-files.outputs.files != ''
        run: pip install tweepy PyYAML

      - name: Post to X
        if: steps.new-files.outputs.files != ''
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          NEW_FILES: ${{ steps.new-files.outputs.files }}
        run: python automation/post_to_x.py
